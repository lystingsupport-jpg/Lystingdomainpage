<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs><style>.bg{fill:#f6f9ff}.card{fill:#fff;stroke:#d9e6ff;stroke-width:3}.title{font:800 38px Arial;fill:#0c1d4a}.sub{font:600 22px Arial;fill:#52617f}.label{font:700 22px Arial;fill:#0c1d4a}.small{font:600 18px Arial;fill:#52617f}.wire{fill:none;stroke:#2468ff;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.power{fill:none;stroke:#ff7a00;stroke-width:6;stroke-linecap:round}.signal{fill:none;stroke:#0aa86b;stroke-width:5;stroke-linecap:round;stroke-dasharray:12 10}.box{fill:#fff;stroke:#2468ff;stroke-width:3}.load{fill:#eef4ff;stroke:#0c1d4a;stroke-width:3}.warn{font:700 17px Arial;fill:#d45b00}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2468ff"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#ff7a00"/></marker></defs>
  <rect class="bg" width="1400" height="900"/><text class="title" x="70" y="80">Hotel / Lodge - Corridor Motion Lighting Circuit</text><text class="sub" x="70" y="118">PIR motion sensor triggers corridor light through IoT controller and relay</text>
  <rect class="card" x="60" y="160" width="1280" height="650" rx="28"/>
  <rect class="box" x="110" y="250" width="190" height="110" rx="16"/><text class="label" x="145" y="296">230V AC</text><text class="small" x="145" y="326">Mains Input</text>
  <rect class="box" x="380" y="250" width="190" height="110" rx="16"/><text class="label" x="425" y="296">MCB</text><text class="small" x="415" y="326">Lighting circuit</text>
  <rect class="box" x="655" y="220" width="230" height="160" rx="18"/><text class="label" x="692" y="278">IoT Controller</text><text class="small" x="700" y="310">Timer + schedule</text><text class="small" x="710" y="342">Relay output</text>
  <rect class="box" x="380" y="510" width="205" height="110" rx="16"/><text class="label" x="430" y="558">PIR Sensor</text><text class="small" x="412" y="588">Motion detection</text>
  <rect class="load" x="1010" y="235" width="250" height="125" rx="16"/><text class="label" x="1056" y="288">Corridor Light</text><text class="small" x="1065" y="318">LED fixture group</text>
  <path class="power" marker-end="url(#o)" d="M300 305 H380"/><path class="power" marker-end="url(#o)" d="M570 305 H655"/><path class="power" marker-end="url(#o)" d="M885 300 H1010"/><path class="signal" marker-end="url(#a)" d="M585 565 C635 500 655 410 710 360"/><path class="wire" marker-end="url(#a)" d="M770 380 C825 470 940 485 1085 360"/>
  <text class="warn" x="110" y="735">Note: Set hold time and lux threshold to avoid nuisance switching. Use rated relay for total corridor load.</text>
