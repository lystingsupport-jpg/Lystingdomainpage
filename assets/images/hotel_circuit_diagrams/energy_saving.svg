<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs><style>.bg{fill:#f6f9ff}.card{fill:#fff;stroke:#d9e6ff;stroke-width:3}.title{font:800 38px Arial;fill:#0c1d4a}.sub{font:600 22px Arial;fill:#52617f}.label{font:700 22px Arial;fill:#0c1d4a}.small{font:600 18px Arial;fill:#52617f}.wire{fill:none;stroke:#2468ff;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.power{fill:none;stroke:#ff7a00;stroke-width:6;stroke-linecap:round}.signal{fill:none;stroke:#0aa86b;stroke-width:5;stroke-linecap:round;stroke-dasharray:12 10}.box{fill:#fff;stroke:#2468ff;stroke-width:3}.load{fill:#eef4ff;stroke:#0c1d4a;stroke-width:3}.warn{font:700 17px Arial;fill:#d45b00}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2468ff"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#ff7a00"/></marker></defs>
  <rect class="bg" width="1400" height="900"/><text class="title" x="70" y="80">Hotel / Lodge - Guest Room Energy Saving Circuit</text><text class="sub" x="70" y="118">Energy meter + occupancy/key-card sensor controls room power scenes</text>
  <rect class="card" x="60" y="160" width="1280" height="650" rx="28"/>
  <rect class="box" x="105" y="250" width="190" height="110" rx="16"/><text class="label" x="140" y="296">230V AC</text><text class="small" x="140" y="326">Room supply</text>
  <rect class="box" x="365" y="250" width="210" height="110" rx="16"/><text class="label" x="400" y="296">Energy Meter</text><text class="small" x="405" y="326">CT / smart meter</text>
  <rect class="box" x="655" y="220" width="230" height="160" rx="18"/><text class="label" x="692" y="278">IoT Controller</text><text class="small" x="690" y="310">Usage + occupancy</text><text class="small" x="705" y="342">Scene logic</text>
  <rect class="box" x="365" y="510" width="210" height="110" rx="16"/><text class="label" x="390" y="558">Occupancy</text><text class="small" x="395" y="588">PIR / key-card</text>
  <rect class="load" x="1010" y="215" width="250" height="120" rx="16"/><text class="label" x="1060" y="268">Room Loads</text><text class="small" x="1042" y="298">Lights / sockets / AC</text>
  <rect class="load" x="1010" y="445" width="250" height="120" rx="16"/><text class="label" x="1050" y="498">Relay Bank</text><text class="small" x="1048" y="528">Power cutoff zones</text>
  <path class="power" marker-end="url(#o)" d="M295 305 H365"/><path class="power" marker-end="url(#o)" d="M575 305 H655"/><path class="power" marker-end="url(#o)" d="M885 275 H1010"/><path class="power" marker-end="url(#o)" d="M1135 335 V445"/><path class="signal" marker-end="url(#a)" d="M575 565 C635 500 655 410 710 360"/><path class="signal" marker-end="url(#a)" d="M575 305 C625 360 650 385 700 360"/><path class="wire" marker-end="url(#a)" d="M885 345 C940 400 955 480 1010 505"/>
  <text class="warn" x="110" y="735">Note: Keep emergency and essential circuits separate. Do not cut critical safety power through guest-room automation.</text>
</svg>
