<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs><style>.bg{fill:#f6f9ff}.card{fill:#fff;stroke:#d9e6ff;stroke-width:3}.title{font:800 38px Arial;fill:#0c1d4a}.sub{font:600 22px Arial;fill:#52617f}.label{font:700 22px Arial;fill:#0c1d4a}.small{font:600 18px Arial;fill:#52617f}.wire{fill:none;stroke:#2468ff;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.power{fill:none;stroke:#ff7a00;stroke-width:6;stroke-linecap:round}.signal{fill:none;stroke:#0aa86b;stroke-width:5;stroke-linecap:round;stroke-dasharray:12 10}.box{fill:#fff;stroke:#2468ff;stroke-width:3}.load{fill:#eef4ff;stroke:#0c1d4a;stroke-width:3}.warn{font:700 17px Arial;fill:#d45b00}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2468ff"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#ff7a00"/></marker></defs>
  <rect class="bg" width="1400" height="900"/><text class="title" x="70" y="80">Hotel / Lodge - Water Pump Automation Circuit</text><text class="sub" x="70" y="118">Water level sensor + IoT controller + relay/contactor for pump control</text>
  <rect class="card" x="60" y="160" width="1280" height="650" rx="28"/>
  <rect class="box" x="105" y="245" width="190" height="110" rx="16"/><text class="label" x="140" y="292">230V AC</text><text class="small" x="140" y="322">Mains Input</text>
  <rect class="box" x="365" y="245" width="190" height="110" rx="16"/><text class="label" x="405" y="292">MCB</text><text class="small" x="390" y="322">Overload/RCCB</text>
  <rect class="box" x="640" y="220" width="230" height="160" rx="18"/><text class="label" x="676" y="278">IoT Controller</text><text class="small" x="684" y="310">Pump logic</text><text class="small" x="678" y="342">Manual / auto</text>
  <rect class="load" x="1015" y="230" width="245" height="120" rx="16"/><text class="label" x="1070" y="282">Contactor</text><text class="small" x="1060" y="312">Pump relay stage</text>
  <rect class="load" x="1015" y="445" width="245" height="120" rx="16"/><text class="label" x="1076" y="498">Pump Motor</text><text class="small" x="1070" y="528">Single/three phase</text>
  <rect class="box" x="370" y="510" width="215" height="110" rx="16"/><text class="label" x="392" y="558">Level Sensor</text><text class="small" x="397" y="588">Float / ultrasonic</text>
  <path class="power" marker-end="url(#o)" d="M295 300 H365"/><path class="power" marker-end="url(#o)" d="M555 300 H640"/><path class="power" marker-end="url(#o)" d="M870 290 H1015"/><path class="power" marker-end="url(#o)" d="M1138 350 V445"/>
  <path class="signal" marker-end="url(#a)" d="M585 565 C635 500 650 410 700 360"/><path class="wire" marker-end="url(#a)" d="M870 335 C935 365 950 420 1015 485"/>
  <text class="warn" x="110" y="735">Note: Use a contactor rated for pump current, dry-run protection, earthing, and enclosure suitable for wet areas.</text>
</svg>
