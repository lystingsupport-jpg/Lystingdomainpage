<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs><style>.bg{fill:#f6f9ff}.card{fill:#fff;stroke:#d9e6ff;stroke-width:3}.title{font:800 38px Arial;fill:#0c1d4a}.sub{font:600 22px Arial;fill:#52617f}.label{font:700 22px Arial;fill:#0c1d4a}.small{font:600 18px Arial;fill:#52617f}.wire{fill:none;stroke:#2468ff;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.power{fill:none;stroke:#ff7a00;stroke-width:6;stroke-linecap:round}.signal{fill:none;stroke:#0aa86b;stroke-width:5;stroke-linecap:round;stroke-dasharray:12 10}.box{fill:#fff;stroke:#2468ff;stroke-width:3}.load{fill:#eef4ff;stroke:#0c1d4a;stroke-width:3}.danger{fill:#fff4ef;stroke:#ff5c24;stroke-width:3}.warn{font:700 17px Arial;fill:#d45b00}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2468ff"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#ff7a00"/></marker></defs>
  <rect class="bg" width="1400" height="900"/><text class="title" x="70" y="80">Hotel / Lodge - Fire / Smoke Safety Circuit</text><text class="sub" x="70" y="118">Smoke sensor + heat/fire sensor connected to alert controller, siren, and notification output</text>
  <rect class="card" x="60" y="160" width="1280" height="650" rx="28"/>
  <rect class="box" x="105" y="250" width="200" height="110" rx="16"/><text class="label" x="145" y="296">12V PSU</text><text class="small" x="132" y="326">Battery backup</text>
  <rect class="box" x="405" y="215" width="245" height="170" rx="18"/><text class="label" x="445" y="274">Alert Controller</text><text class="small" x="455" y="306">IoT notification</text><text class="small" x="450" y="338">Alarm relay output</text>
  <rect class="danger" x="780" y="210" width="220" height="120" rx="16"/><text class="label" x="826" y="262">Smoke Sensor</text><text class="small" x="835" y="292">Photoelectric</text>
  <rect class="danger" x="780" y="430" width="220" height="120" rx="16"/><text class="label" x="834" y="482">Heat Sensor</text><text class="small" x="830" y="512">Rate-of-rise / fixed</text>
  <rect class="load" x="1085" y="210" width="210" height="120" rx="16"/><text class="label" x="1145" y="262">Siren</text><text class="small" x="1128" y="292">Alarm sounder</text>
  <rect class="load" x="1085" y="430" width="210" height="120" rx="16"/><text class="label" x="1132" y="482">Dashboard</text><text class="small" x="1125" y="512">SMS/app alert</text>
  <path class="power" marker-end="url(#o)" d="M305 305 H405"/><path class="signal" marker-end="url(#a)" d="M780 270 H650"/><path class="signal" marker-end="url(#a)" d="M780 490 H650"/><path class="wire" marker-end="url(#a)" d="M650 300 H1085"/><path class="signal" marker-end="url(#a)" d="M650 345 C815 430 930 490 1085 490"/>
  <text class="warn" x="110" y="735">Note: This diagram is for IoT alerting concept only. Follow local fire code and certified fire alarm standards.</text>
</svg>
