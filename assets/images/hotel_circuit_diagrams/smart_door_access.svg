<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs><style>.bg{fill:#f6f9ff}.card{fill:#fff;stroke:#d9e6ff;stroke-width:3}.title{font:800 38px Arial;fill:#0c1d4a}.sub{font:600 22px Arial;fill:#52617f}.label{font:700 22px Arial;fill:#0c1d4a}.small{font:600 18px Arial;fill:#52617f}.wire{fill:none;stroke:#2468ff;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.power{fill:none;stroke:#ff7a00;stroke-width:6;stroke-linecap:round}.signal{fill:none;stroke:#0aa86b;stroke-width:5;stroke-linecap:round;stroke-dasharray:12 10}.box{fill:#fff;stroke:#2468ff;stroke-width:3}.load{fill:#eef4ff;stroke:#0c1d4a;stroke-width:3}.warn{font:700 17px Arial;fill:#d45b00}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2468ff"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#ff7a00"/></marker></defs>
  <rect class="bg" width="1400" height="900"/><text class="title" x="70" y="80">Hotel / Lodge - Smart Door Access Circuit</text><text class="sub" x="70" y="118">Smart lock + RFID/keypad + door contact sensor connected to IoT access controller</text>
  <rect class="card" x="60" y="160" width="1280" height="650" rx="28"/>
  <rect class="box" x="115" y="250" width="200" height="110" rx="16"/><text class="label" x="160" y="296">12V PSU</text><text class="small" x="145" y="326">Door power supply</text>
  <rect class="box" x="415" y="220" width="245" height="170" rx="18"/><text class="label" x="455" y="280">Access Controller</text><text class="small" x="470" y="312">IoT / Wi-Fi module</text><text class="small" x="455" y="345">Relay + input pins</text>
  <rect class="load" x="780" y="215" width="210" height="120" rx="16"/><text class="label" x="828" y="266">Smart Lock</text><text class="small" x="816" y="296">Mag lock / strike</text>
  <rect class="load" x="780" y="430" width="210" height="120" rx="16"/><text class="label" x="820" y="482">Door Sensor</text><text class="small" x="818" y="512">Reed contact</text>
  <rect class="load" x="1070" y="215" width="210" height="120" rx="16"/><text class="label" x="1115" y="266">RFID Reader</text><text class="small" x="1110" y="296">Wiegand / UART</text>
  <rect class="load" x="1070" y="430" width="210" height="120" rx="16"/><text class="label" x="1130" y="482">Keypad</text><text class="small" x="1115" y="512">PIN access</text>
  <path class="power" marker-end="url(#o)" d="M315 305 H415"/><path class="power" marker-end="url(#o)" d="M660 275 H780"/><path class="wire" marker-end="url(#a)" d="M660 320 C705 380 725 470 780 490"/><path class="signal" marker-end="url(#a)" d="M1070 275 H990"/><path class="signal" marker-end="url(#a)" d="M1070 490 H990"/><path class="signal" marker-end="url(#a)" d="M780 490 H660"/>
  <text class="warn" x="110" y="735">Note: Fail-safe/fail-secure lock choice depends on fire exit rules. Add manual override where required.</text>
</svg>
